<!doctype html>
<html lang="en">
<head>
	{% load static %}
	{{ form.media }}
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link rel="icon" href="{% static 'portfolio/img/gautamw3-favicon.png' %}" type="image/png">
	<title>Portfolio cum Blog - {% block title %}{% endblock %}</title>
	<link rel="stylesheet" href="{% static 'portfolio/css/bootstrap.css' %}">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link rel="stylesheet" href="{% static 'portfolio/css/toaster.min.css' %}">
	<link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}">
	<link rel="stylesheet" href="{% static 'portfolio/css/portfolio_custom.css' %}">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@glidejs/glide@3.6.0/dist/css/glide.core.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
</head>
<body>
<header class="custom-header">
	<nav class="navbar navbar-expand-lg">
		<div class="container">
			<a class="navbar-brand" href="{% url 'index' %}">
				<img src="{% static 'portfolio/img/gautamw3_logo.png' %}" alt="G3 Logo">
			</a>
			<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
				<span><i class="fas fa-bars text-white"></i></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarContent">
				<ul class="navbar-nav ml-auto align-items-lg-center">
					<li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}" href="{% url 'index' %}">Home</a></li>
					<li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'about_me' %}active{% endif %}" href="{% url 'about_me' %}">About</a></li>
					<li class="nav-item dropdown">
						<a class="nav-link dropdown-toggle" href="#" id="portfolioDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Portfolio</a>
						<div class="dropdown-menu" aria-labelledby="portfolioDropdown">
							<a class="dropdown-item" href="{% url 'user_portfolio' %}">Portfolio</a>
							<a class="dropdown-item" href="{% url 'user_profile_details' %}">Profile Details</a>
						</div>
					</li>
					<li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'contact_us' %}active{% endif %}" href="{% url 'contact_us' %}">Contact</a></li>
					<li class="nav-item social-icons d-flex">
						<a href="{{ github }}" class="nav-link" target="_blank" rel="noreferrer"><i class="fab fa-github"></i></a>
						<a href="{{ linkedin }}" class="nav-link" target="_blank" rel="noreferrer"><i class="fab fa-linkedin-in"></i></a>
						<a href="{{ tweeter }}" class="nav-link" target="_blank" rel="noreferrer"><i class="fab fa-twitter"></i></a>
						<a href="{{ instagram }}" class="nav-link" target="_blank" rel="noreferrer"><i class="fab fa-instagram"></i></a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
</header>

{% block pagecontent %}{% endblock %}

<footer class="custom-footer">
	<div class="container text-center">
		<img src="{% static 'portfolio/img/gautamw3_logo.png' %}" alt="G3 Logo" style="width:72px;height:72px;border-radius:18px;box-shadow:0 10px 24px rgba(0,0,0,.18);">
		<div class="mt-3 mb-2">
			<a href="{{ github }}" target="_blank" rel="noreferrer" class="mx-2"><i class="fa-brands fa-github fa-lg"></i></a>
			<a href="{{ linkedin }}" target="_blank" rel="noreferrer" class="mx-2"><i class="fa-brands fa-linkedin fa-lg"></i></a>
			<a href="{{ tweeter }}" target="_blank" rel="noreferrer" class="mx-2"><i class="fa-brands fa-twitter fa-lg"></i></a>
			<a href="{{ instagram }}" target="_blank" rel="noreferrer" class="mx-2"><i class="fa-brands fa-instagram fa-lg"></i></a>
		</div>
		<p class="mb-0">© {% now "Y" %} Gautam Kumar. All rights reserved.</p>
	</div>
</footer>

<script src="{% static 'portfolio/js/jquery-3.2.1.min.js' %}"></script>
<script src="{% static 'portfolio/js/popper.js' %}"></script>
<script src="{% static 'portfolio/js/bootstrap.min.js' %}"></script>
<script src="{% static 'portfolio/js/toaster.min.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/mixitup@3/dist/mixitup.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@glidejs/glide@3.6.0/dist/glide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="{% static 'portfolio/js/portfolio_script.js' %}"></script>
<script>var SITE_ROOT = "{{ request.scheme }}://{{ request.get_host }}";</script>
</body>
</html>
